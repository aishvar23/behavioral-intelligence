name: Deploy Backend to Azure App Service

on:
  push:
    branches:
      - main          # → dev
      - staging       # → staging
      - production    # → prod
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    # Pick the GitHub Environment based on branch
    # Each environment has its own scoped secrets
    environment: ${{ github.ref_name == 'main' && 'dev' || github.ref_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Compile TypeScript
        working-directory: backend
        run: npx tsc

      - name: Create deployment zip
        working-directory: backend
        run: zip -r ../deploy.zip dist/ src/ package.json package-lock.json tsconfig.json

      - name: Deploy to Azure App Service
        env:
          KUDU_USER: ${{ secrets.AZURE_KUDU_USER }}
          KUDU_PASS: ${{ secrets.AZURE_KUDU_PASS }}
          APP_HOSTNAME: ${{ secrets.AZURE_APP_HOSTNAME }}
        run: |
          # Upload zip (async — returns 202 immediately)
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            --max-time 120 \
            -u "$KUDU_USER:$KUDU_PASS" \
            -T deploy.zip \
            "https://$APP_HOSTNAME/api/zipdeploy?isAsync=true")
          echo "Upload HTTP: $HTTP"
          if [ "$HTTP" != "202" ] && [ "$HTTP" != "200" ]; then exit 1; fi

          # Poll until complete (max 5 min)
          for i in $(seq 1 20); do
            sleep 15
            STATUS=$(curl -s --max-time 10 -u "$KUDU_USER:$KUDU_PASS" \
              "https://$APP_HOSTNAME/api/deployments/latest" | \
              python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status'))" 2>/dev/null)
            echo "[${i}] Deployment status: $STATUS"
            if [ "$STATUS" = "4" ]; then echo "Deployment succeeded."; exit 0; fi
            if [ "$STATUS" = "3" ]; then echo "Deployment failed."; exit 1; fi
          done
          echo "Deployment timed out after polling."
          exit 1
